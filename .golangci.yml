linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofumpt
    - goimports
    - gocritic
    - misspell
    - prealloc
    - nilerr
    - exhaustive

linters-settings:
  goimports:
    local-prefixes: github.com/chefenfd

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic

run:
  timeout: 5m
  go: "1.23"
