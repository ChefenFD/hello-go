name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test og lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sæt Go op
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Download afhængigheder
        run: go mod download

      - name: Byg
        run: go build ./...

      - name: Kør tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
        continue-on-error: true

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  security:
    name: Sikkerhedsscanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sæt Go op
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
